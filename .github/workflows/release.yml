name: release

on:
  push:
    tags:
      - v*
  workflow_dispatch:  

permissions:
  contents: write

jobs:
  release:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # v2
          with:
            fetch-depth: 0

        - name: Create Release
          uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
          if: startsWith(github.ref, 'refs/tags/')
          with:
            tag_name: ${{ github.ref_name }}
            name: Release ${{ github.ref_name }}
            draft: true
            prerelease: false
            generate_release_notes: true
  artefact:
    strategy:
          matrix:
            include:
              - name: Linux x86_64
                os: ubuntu-latest
                target: x86_64-unknown-linux-musl
                suffix: ''
    runs-on: ${{ matrix.os }}
    name: Create artefact for ${{ matrix.name }}
    needs: [release]
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
      - name: Stable Rust
        uses: actions-rs/toolchain@16499b5e05bf2e26879000db0c1d13f7e13fa3af # v1
        with:
          profile: minimal
          target: ${{ matrix.target }}
          toolchain: stable
      - name: Install musl-tools
        run: sudo apt update -y && sudo apt install musl-tools -y
        if: matrix.os == 'ubuntu-latest'
      - name: Build
        run: cargo build --target ${{ matrix.target }} --release
      - name: Move binary
        run: mv target/${{ matrix.target }}/release/richard${{ matrix.suffix }} richard-${{ github.ref_name }}-${{ matrix.target }}${{ matrix.suffix }}
      - name: Upload Artefact to release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: true
          prerelease: false
          files: richard-${{ github.ref_name }}-${{ matrix.target }}${{ matrix.suffix }}